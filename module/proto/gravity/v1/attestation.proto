syntax = "proto3";
package gravity.v1;

import "gogoproto/gogo.proto";
import "google/protobuf/any.proto";
import "gravity/v1/types.proto";

option go_package = "github.com/Gravity-Bridge/Gravity-Bridge/module/x/gravity/types";

// ClaimType is the cosmos type of an event from the counterpart chain that can
// be handled
enum ClaimType {
  option (gogoproto.goproto_enum_prefix) = false;

  // An unspecified claim type
  CLAIM_TYPE_UNSPECIFIED = 0;
  // A claim for a SendToCosmos transaction
  CLAIM_TYPE_SEND_TO_COSMOS = 1;
  // A claim for when batches are relayed
  CLAIM_TYPE_BATCH_SEND_TO_ETH = 2;
  // A claim for when an erc20 contract has been deployed
  CLAIM_TYPE_ERC20_DEPLOYED = 3;
  // A claim for when a logic call has been executed
  CLAIM_TYPE_LOGIC_CALL_EXECUTED = 4;
  // A claim for when a valset update has happened
  CLAIM_TYPE_VALSET_UPDATED = 5;
}

// Components used in MsgSendToCosmosClaim's ClaimHash()
message SendToCosmosClaimComponents {
  uint64 event_nonce = 1;
  uint64 eth_block_height = 2;
  string token_contract = 3;
  string amount = 4; // Must be sdkmath.Int.String()
  string ethereum_sender = 5;
  string cosmos_receiver = 6;
}

// Components used in MsgBatchSendToEthClaim's ClaimHash()
message BatchSendToEthClaimComponents {
  uint64 event_nonce = 1;
  uint64 eth_block_height = 2;
  uint64 batch_nonce = 3;
  string token_contract = 4;
}

// Components used in MsgERC20DeployedClaim's ClaimHash()
message ERC20DeployedClaimComponents {
  uint64 event_nonce = 1;
  uint64 eth_block_height = 2;
  string cosmos_denom = 3;
  string token_contract = 4;
  string name = 5;
  string symbol = 6;
  uint64 decimals = 7;
}

// Components used in MsgLogicCallExecutedClaim's ClaimHash()
message LogicCallExecutedClaimComponents {
  uint64 event_nonce = 1;
  uint64 eth_block_height = 2;
  bytes invalidation_id = 3; // Raw bytes; formatted with %s during reconstruction
  uint64 invalidation_nonce = 4;
}

// Components used in MsgValsetUpdatedClaim's ClaimHash()
// NOTE: MUST SORT valset members before hashing
message ValsetUpdatedClaimComponents {
  uint64 event_nonce = 1;
  uint64 valset_nonce = 2;
  uint64 eth_block_height = 3;
  repeated BridgeValidator members = 4 [
    (gogoproto.nullable) = false
  ];
  string reward_amount = 5; // Must be sdkmath.Int.String()
  string reward_token = 6;
}

// Holds the components used in a Claim's ClaimHash() function, used as an additional security measure against tampering
message ClaimHashComponents {
  // The actual components used in ClaimHash()
  oneof components {
    SendToCosmosClaimComponents send_to_cosmos = 1;
    BatchSendToEthClaimComponents batch_send_to_eth = 2;
    ERC20DeployedClaimComponents erc20_deployed = 3;
    LogicCallExecutedClaimComponents logic_call_executed = 4;
    ValsetUpdatedClaimComponents valset_updated = 5;
  }
}

// Attestation is an aggregate of `claims` that eventually becomes `observed` by
// all orchestrators
// EVENT_NONCE:
// EventNonce a nonce provided by the gravity contract that is unique per event
// fired These event nonces must be relayed in order. This is a correctness
// issue, if relaying out of order transaction replay attacks become possible
// OBSERVED:
// Observed indicates that >67% of validators have attested to the event,
// and that the event should be executed by the gravity state machine
message Attestation {
  bool observed = 1;
  repeated string votes = 2;
  uint64 height = 3;
  google.protobuf.Any claim = 4;
  ClaimType claim_type = 5;
  ClaimHashComponents claim_components = 6;
}

// ERC20Token unique identifier for an Ethereum ERC20 token.
// CONTRACT:
// The contract address on ETH of the token, this could be a Cosmos
// originated token, if so it will be the ERC20 address of the representation
// (note: developers should look up the token symbol using the address on ETH to
// display for UI)
message ERC20Token {
  string contract = 1;
  string amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message EventObservation {
  string attestation_type = 1;
  string bridge_contract = 2;
  string bridge_chain_id = 3;
  string attestation_id = 4;
  string nonce = 5;
}

message EventInvalidSendToCosmosReceiver {
  string amount = 1;
  string nonce = 2;
  string token = 3;
  string sender = 4;
}

message EventSendToCosmos {
  string amount = 1;
  string nonce = 2;
  string token = 3;
}

message EventSendToCosmosLocal {
  string nonce = 1;
  string receiver = 2;
  string token = 3;
  string amount = 4;
}

message EventSendToCosmosPendingIbcAutoForward {
  string nonce = 1;
  string receiver = 2;
  string token = 3;
  string amount = 4;
  string channel = 5;
}

message EventSendToCosmosExecutedIbcAutoForward {
  string nonce = 1;
  string receiver = 2;
  string token = 3;
  string amount = 4;
  string channel = 5;
  string timeout_time = 6;
  string timeout_height = 7;
}