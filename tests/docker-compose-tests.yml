version: '3.9'

# YAML anchor defining common test service configuration.
# Each service runs a fully self-contained test environment
# (cosmos validators, ethereum node, and test runner) inside a
# single container, so no shared network is required.
x-test-service: &test-service
  image: gravity-base
  cap_add:
    - NET_ADMIN
  tty: true

services:
  test-happy_path:
    <<: *test-service
    container_name: gravity-test-happy_path
    environment:
      - TEST_TYPE=HAPPY_PATH
    command: /bin/bash /gravity/tests/container-scripts/all-up-test-internal.sh 4 HAPPY_PATH

  test-validator_out:
    <<: *test-service
    container_name: gravity-test-validator_out
    environment:
      - TEST_TYPE=VALIDATOR_OUT
    command: /bin/bash /gravity/tests/container-scripts/all-up-test-internal.sh 4 VALIDATOR_OUT

  test-valset_stress:
