    container_name: gravity-test-batch_stress
    environment:
      - TEST_TYPE=BATCH_STRESS
    command: /bin/bash /gravity/tests/container-scripts/all-up-test-internal.sh 4 BATCH_STRESS

  test-happy_path_v2:
    <<: *test-service
    container_name: gravity-test-happy_path_v2
    environment:
      - TEST_TYPE=HAPPY_PATH_V2
    command: /bin/bash /gravity/tests/container-scripts/all-up-test-internal.sh 4 HAPPY_PATH_V2

  test-orchestrator_keys:
